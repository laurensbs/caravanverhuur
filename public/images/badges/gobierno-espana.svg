<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80">
  <rect width="340" height="80" fill="none"/>
  <!-- Simplified shield -->
  <g transform="translate(10,8)">
    <rect x="0" y="0" width="64" height="52" rx="4" fill="#c8102e"/>
    <rect x="0" y="0" width="64" height="17" rx="4" fill="#c8102e"/>
    <rect x="0" y="17" width="64" height="18" fill="#FABD00"/>
    <rect x="0" y="35" width="64" height="17" rx="0" fill="#c8102e"/>
    <rect x="22" y="10" width="20" height="32" rx="2" fill="#c8102e" stroke="#FABD00" stroke-width="2"/>
    <rect x="27" y="15" width="10" height="10" rx="1" fill="#FABD00"/>
    <!-- Crown -->
    <rect x="18" y="-4" width="28" height="8" rx="2" fill="#FABD00"/>
    <circle cx="22" cy="-6" r="2.5" fill="#c8102e"/>
    <circle cx="32" cy="-8" r="2.5" fill="#c8102e"/>
