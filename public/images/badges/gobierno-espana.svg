  <line x1="88" y1="50" x2="170" y2="50" stroke="white" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="88" y="64" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="white" fill-opacity="0.7" letter-spacing="0.3">Ministerio de Asuntos</text>
  <text x="88" y="74" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="white" fill-opacity="0.7" letter-spacing="0.3">Económicos y Trans. Digital</text>
</svg>